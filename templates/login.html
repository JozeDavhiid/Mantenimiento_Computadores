<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - Sistema de Mantenimiento</title>

  <!-- ✅ Meta para versión móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 15px;
    }

    .login-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 30px;
      animation: fadeIn 0.6s ease;
    }

    .form-control, .btn {
      border-radius: 10px;
    }

    .btn-primary {
      background-color: #0d6efd;
      border: none;
    }

    .btn-primary:hover {
      background-color: #0b5ed7;
    }

    .text-muted a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }

    .text-muted a:hover {
      text-decoration: underline;
    }

    .btn-outline-primary {
      border-radius: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 🔹 Ajustes para pantallas pequeñas */
    @media (max-width: 576px) {
      .login-card {
        padding: 25px 20px;
      }
      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">🖥️ Sistema de Mantenimiento</h2>
      <p class="text-muted">Inicia sesión para continuar</p>
    </div>

    <!-- ✅ Mensajes Flask -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- ✅ Formulario de login -->
    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label for="usuario" class="form-label fw-bold">Usuario</label>
        <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
      </div>

      <div class="mb-3">
        <label for="contrasena" class="form-label fw-bold">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="********" required>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary fw-bold">Iniciar Sesión</button>
      </div>
    </form>

    <div class="text-center text-muted mt-2">
      <a href="{{ url_for('recuperar') }}">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
