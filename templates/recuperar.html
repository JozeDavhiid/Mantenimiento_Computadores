<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Sistema de Mantenimiento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .recuperar-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 30px;
      animation: fadeIn 0.6s ease;
    }

    .form-control, .btn {
      border-radius: 10px;
    }

    .btn-primary {
      background-color: #0d6efd;
      border: none;
    }

    .btn-primary:hover {
      background-color: #0b5ed7;
    }

    .text-muted a {
      color: #0d6efd;
      text-decoration: none;
    }

    .text-muted a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-15px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

<div class="recuperar-card">
  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary">🔒 Recuperar Contraseña</h2>
    <p class="text-muted">Ingresa tu <b>usuario</b> para recibir un correo con tu nueva contraseña.</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('recuperar') }}">
    <div class="mb-3">
      <label for="usuario" class="form-label fw-bold">Usuario</label>
      <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Tu usuario" required autofocus>
    </div>

    <div class="d-grid mb-3">
      <button type="submit" class="btn btn-primary fw-bold">Enviar instrucciones</button>
    </div>
  </form>

  <div class="text-center text-muted">
    <a href="{{ url_for('login') }}">⬅️ Volver al inicio de sesión</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
